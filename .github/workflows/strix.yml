name: Strix Security Scan

on:
  push:
    branches: [develop, main]
  pull_request:
  schedule:
    # Weekly scan on protected branches (Mondays at 03:00 UTC).
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: strix-${{ github.workflow }}-${{ github.ref }}
  # cancel-in-progress deliberately disabled: an attacker could force-push
  # a benign commit to cancel an in-progress scan of a malicious commit.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  strix:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Self-test Strix gate script
        run: bash ./scripts/ci/test_strix_quick_gate.sh

      - name: Gate Strix secrets
        id: gate
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          strix_llm="$(printf '%s' "$STRIX_LLM" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          llm_api_key="$(printf '%s' "$LLM_API_KEY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$strix_llm" ] || [ -z "$llm_api_key" ]; then
            # On push/schedule to protected branches, fail-closed: missing
            # secrets must not silently produce a green check.
            if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
              echo '::error::Strix secrets not configured on push/schedule event; failing closed.'
              exit 1
            fi
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
            echo 'Strix secrets not configured; skipping.'
          else
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Gate GCP credentials
        id: gcp_gate
        if: steps.gate.outputs.enabled == 'true'
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo 'has_gcp=true' >> "$GITHUB_OUTPUT"
          else
            echo 'has_gcp=false' >> "$GITHUB_OUTPUT"
            echo 'GCP credentials not configured; Vertex AI auth will not be available.'
          fi

      - name: Authenticate to Google Cloud
        id: gcp_auth
        if: steps.gate.outputs.enabled == 'true' && steps.gcp_gate.outputs.has_gcp == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Relocate generated GCP credentials outside scan target
        if: steps.gate.outputs.enabled == 'true' && steps.gcp_gate.outputs.has_gcp == 'true'
        run: |
          auth_creds_path="${{ steps.gcp_auth.outputs.credentials_file_path }}"
          relocated="$(python3 - "$auth_creds_path" <<'PY'
          from pathlib import Path
          import os
          import shutil
          import sys

          if len(sys.argv) != 2:
              raise SystemExit("Expected credentials file path argument")

          src_path = Path(sys.argv[1]).resolve(strict=True)
          runner_temp = Path(os.environ["RUNNER_TEMP"]).resolve(strict=True)
          if runner_temp not in src_path.parents:
              raise SystemExit(f"Expected auth-generated credentials inside RUNNER_TEMP, got {src_path}")

          relocated = runner_temp / "gha-creds-relocated.json"
          shutil.move(str(src_path), relocated)
          print(relocated)
          PY
          )"
          {
            echo "GOOGLE_GHA_CREDS_PATH=$relocated"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$relocated"
            echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=$relocated"
          } >> "$GITHUB_ENV"

      - name: Install Strix
        if: steps.gate.outputs.enabled == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir "strix-agent==0.8.3" "google-cloud-aiplatform>=1.133.0,<2"

      - name: Mask LLM API key
        if: steps.gate.outputs.enabled == 'true'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          # Sanitize CR/LF before masking to prevent broken ::add-mask::
          # commands and potential workflow command injection.
          sanitized="$(printf '%s' "$LLM_API_KEY" | tr -d '\r\n')"
          if [ -n "$sanitized" ]; then
            echo "::add-mask::${sanitized}"
            trimmed="$(printf '%s' "$sanitized" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            if [ -n "$trimmed" ] && [ "$trimmed" != "$sanitized" ]; then
              echo "::add-mask::${trimmed}"
            fi
          fi

      - name: Compute pull_request Strix scan scope
        id: pr_scope
        if: steps.gate.outputs.enabled == 'true' && github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import pathlib
          import re
          import subprocess

          base = os.environ.get("PR_BASE_SHA", "").strip()
          head = os.environ.get("PR_HEAD_SHA", "").strip()
          files = []
          if base and head:
              completed = subprocess.run(
                  ["git", "diff", "--name-only", "--diff-filter=ACMR", base, head],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              pattern = re.compile(r".*\.(java|kt|kts|groovy|scala|py|js|jsx|ts|tsx|vue|yaml|yml|sh|sql|xml|json|md)$", re.IGNORECASE)
              for raw_line in completed.stdout.splitlines():
                  rel_path = raw_line.strip()
                  if not rel_path or not pattern.fullmatch(rel_path):
                      continue
                  if rel_path.endswith((".md", ".txt")):
                      continue
                  if "/src/test/" in rel_path or rel_path.startswith("tests/"):
                      continue
                  if rel_path.endswith(("pnpm-lock.yaml", "package-lock.json", "yarn.lock", "uv.lock")):
                      continue
                  if not pathlib.Path(rel_path).is_file():
                      continue
                  files.append(rel_path)

          print("files<<EOF")
          if files:
              print("\n".join(files))
          print("EOF")
          PY

      - name: Run Strix (quick)
        if: steps.gate.outputs.enabled == 'true'
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          STRIX_LLM_DEFAULT_PROVIDER: vertex_ai
          VERTEX_LOCATION: global
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          RAW_LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          STRIX_VERTEX_FALLBACK_MODELS: "vertex_ai/gemini-2.5-pro vertex_ai/gemini-2.5-flash"
          STRIX_TARGET_PATH: ./
          STRIX_REASONING_EFFORT: ${{ github.event_name == 'push' && 'low' || 'minimal' }}
          STRIX_LLM_MAX_RETRIES: 1
          LLM_TIMEOUT: 90
          STRIX_MEMORY_COMPRESSOR_TIMEOUT: 10
          STRIX_TRANSIENT_RETRY_PER_MODEL: 2
          STRIX_TRANSIENT_RETRY_BACKOFF_SECONDS: 3
          STRIX_PROCESS_TIMEOUT_SECONDS: 1200
          STRIX_TOTAL_TIMEOUT_SECONDS: 3000
          STRIX_PR_SCOPE_MAX_FILES_PER_BATCH: 20
          STRIX_FAIL_ON_MIN_SEVERITY: CRITICAL
          STRIX_CHANGED_FILES: ${{ github.event_name == 'pull_request' && steps.pr_scope.outputs.files || '' }}
          PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
        run: bash ./scripts/ci/strix_quick_gate.sh

      - name: Upload Strix reports artifact
        if: ${{ always() && !cancelled() && steps.gate.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: strix-reports
          path: strix_runs/
          if-no-files-found: warn
          retention-days: 5
