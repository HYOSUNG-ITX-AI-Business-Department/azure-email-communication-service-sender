version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emailuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emailpass}
      POSTGRES_DB: ${POSTGRES_DB:-emails}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emailuser} -d ${POSTGRES_DB:-emails}"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: python -m app.main
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALLOWED_MAILFROM=${ALLOWED_MAILFROM}
      - ALLOWED_HEADERS=${ALLOWED_HEADERS:-}
      - REDIS_URL=redis://valkey:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-emailuser}:${POSTGRES_PASSWORD:-emailpass}@postgres:5432/${POSTGRES_DB:-emails}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_DELAY_SECONDS=${RETRY_DELAY_SECONDS:-60}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: python worker.py
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALLOWED_MAILFROM=${ALLOWED_MAILFROM}
      - REDIS_URL=redis://valkey:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-emailuser}:${POSTGRES_PASSWORD:-emailpass}@postgres:5432/${POSTGRES_DB:-emails}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_DELAY_SECONDS=${RETRY_DELAY_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.parse,socket; u=urllib.parse.urlparse(os.environ['REDIS_URL']); socket.create_connection((u.hostname, u.port or 6379), 2).close()\""]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      replicas: 1

volumes:
  postgres_data:
  valkey_data:
